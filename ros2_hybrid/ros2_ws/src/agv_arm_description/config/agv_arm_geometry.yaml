robot:
  name: agv_dual_arm
  units:
    length: mm
    angle: deg

links:
  # ROS/RViz geometry scaled by 10 from the original Java prototype constants.
  # The Java application constants are unchanged.
  L0: 1300.0
  L1: 0.0
  L2: 320.0
  L3: 0.0
  L4: 200.0
  L5: 250.0
  L6: 0.0
  L7: 150.0

base:
  torso_height: 1300.0
  torso_y_offset: 0.0
  shoulder_z: 1300.0
  shoulder_y_offset: 320.0

joint_limits:
  right:
    joint_1: { lower: -45.0, upper: 45.0, velocity: 1.5, effort: 8.0 }
    joint_2: { lower: -90.0, upper: 90.0, velocity: 1.5, effort: 8.0 }
    joint_3: { lower: 0.0, upper: 145.0, velocity: 1.5, effort: 8.0 }
    joint_4: { lower: -60.0, upper: 20.0, velocity: 1.5, effort: 8.0 }
    joint_5: { lower: -90.0, upper: 90.0, velocity: 1.5, effort: 8.0 }
    joint_6: { lower: 0.0, upper: 90.0, velocity: 1.5, effort: 8.0 }
  left:
    joint_1: { lower: -45.0, upper: 45.0, velocity: 1.5, effort: 8.0 }
    joint_2: { lower: -90.0, upper: 90.0, velocity: 1.5, effort: 8.0 }
    joint_3: { lower: -145.0, upper: 0.0, velocity: 1.5, effort: 8.0 }
    joint_4: { lower: -20.0, upper: 60.0, velocity: 1.5, effort: 8.0 }
    joint_5: { lower: -90.0, upper: 90.0, velocity: 1.5, effort: 8.0 }
    joint_6: { lower: 0.0, upper: 90.0, velocity: 1.5, effort: 8.0 }

visual:
  decoration_scale: 10.0
  link_radius: 60.0
  joint_radius: 80.0
  gripper_length: 200.0
