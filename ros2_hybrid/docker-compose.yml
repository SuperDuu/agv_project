services:
  ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: agv-ros2-hybrid:jazzy
    container_name: agv_ros2_hybrid
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    volumes:
      - ./ros2_ws:/workspaces/agv_ros2
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /workspaces/agv_ros2
    stdin_open: true
    tty: true
