services:
  ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: agv-ros2-hybrid:jazzy
    container_name: agv_ros2_hybrid
    ipc: host
    ports:
      - "5010:5010/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    volumes:
      - ./ros2_ws:/workspaces/agv_ros2
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /workspaces/agv_ros2
    stdin_open: true
    tty: true
    # Build any changed packages, then launch the full stack
    command: >
      bash -c "colcon build --symlink-install --packages-select agv_arm_moveit agv_arm_bridge agv_arm_description 2>&1 | tail -3 &&
               source install/setup.bash &&
               ros2 launch agv_arm_moveit full_stack.launch.py"
